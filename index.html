<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A.I.O.S. — Multitool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0044cc">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000510;color:#e8f4ff;font-family:'Exo 2',sans-serif;}

/* BG VIDEO */
#bgVideo{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 1s;}

/* MATRIX */
#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0;transition:opacity 1s;}

/* BOOT */
#boot{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,5,20,0.6);}
#bootTitle{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;letter-spacing:16px;background:linear-gradient(90deg,#fff,#44aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transition:opacity 1s;text-align:center;text-shadow:0 0 40px #0066ff;}
#bootSub{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;letter-spacing:8px;color:#88ccff;text-align:center;opacity:0;transition:opacity 1s;margin-top:16px;text-shadow:0 0 20px #0066ff;}
#bootBar{width:300px;height:2px;background:rgba(0,100,255,0.2);margin-top:40px;opacity:0;transition:opacity 0.5s;}
#bootBarFill{height:100%;width:0%;background:linear-gradient(90deg,#0044ff,#00ccff);transition:width 8s linear;box-shadow:0 0 10px #00aaff;}

/* COCKPIT */
#cockpit{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;}

/* TOP HUD BAR */
.hud-top{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;background:rgba(0,5,20,0.95);border-bottom:1px solid #0a2244;flex-shrink:0;}
.hud-logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:5px;background:linear-gradient(90deg,#fff,#44aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hud-status{display:flex;align-items:center;gap:16px;}
.hud-badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;border:1px solid #0a3366;color:#44aaff;letter-spacing:2px;}
.sdot{width:6px;height:6px;border-radius:50%;background:#0088ff;animation:pulse 2s infinite;box-shadow:0 0 6px #0066ff;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* MAIN AREA */
.main-area{display:flex;flex:1;overflow:hidden;}

/* LEFT - CHAT */
.chat-panel{display:flex;flex-direction:column;width:55%;border-right:1px solid #0a2244;background:rgba(0,3,14,0.88);}
.panel-header{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:#0066aa;padding:6px 12px;border-bottom:1px solid #0a1a33;background:rgba(0,5,20,0.9);flex-shrink:0;}
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:2px;}
.chat::-webkit-scrollbar-thumb{background:#0a2244;}
.msg{display:flex;flex-direction:column;gap:3px;animation:fadein 0.3s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mlabel{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;font-weight:700;}
.msg.ai .mlabel{color:#4488cc;}
.msg.user .mlabel{color:#226699;}
.mbubble{padding:8px 12px;font-size:12px;line-height:1.6;font-weight:300;max-width:92%;white-space:pre-wrap;word-break:break-word;}
.msg.ai .mbubble{background:rgba(0,20,80,0.9);border-left:2px solid #1a4488;color:#cce4ff;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;}
.msg.ai .mtext{flex:1;min-width:0;}
.msg.user .mbubble{background:rgba(0,10,40,0.9);border-right:2px solid #0a2255;color:#99bbdd;align-self:flex-end;}
.thinking{font-family:'Share Tech Mono',monospace;font-size:10px;color:#336699;padding:6px 12px;display:flex;gap:4px;align-items:center;}
.tdots span{animation:blink 1.2s infinite;opacity:0;}
.tdots span:nth-child(2){animation-delay:.3s;}
.tdots span:nth-child(3){animation-delay:.6s;}
@keyframes blink{0%,100%{opacity:0;}50%{opacity:1;}}
.playbtn{background:none;border:1px solid #1a3355;border-radius:50%;width:18px;height:18px;cursor:pointer;color:#4488cc;font-size:8px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.irow{padding:8px 10px;border-top:1px solid #0a1a33;background:rgba(0,4,18,0.97);display:flex;gap:6px;flex-shrink:0;}
.ifield{flex:1;background:rgba(0,5,22,0.95);border:1px solid #0a1a33;border-radius:1px;padding:7px 10px;font-family:'Exo 2',sans-serif;font-size:12px;color:#cce4ff;outline:none;resize:none;min-height:34px;max-height:70px;line-height:1.5;transition:border-color .2s;}
.ifield:focus{border-color:#1a4488;}
.ifield::placeholder{color:#0a1a33;}
.sbtn{width:34px;height:34px;border:1px solid #1a3355;background:rgba(0,15,60,0.7);cursor:pointer;color:#4488cc;font-size:13px;display:flex;align-items:center;justify-content:center;align-self:flex-end;flex-shrink:0;}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;}

/* RIGHT - APPS */
.apps-panel{width:45%;display:flex;flex-direction:column;background:rgba(0,3,14,0.88);}
.apps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:#020810;padding:4px;flex-shrink:0;}
.app-btn{background:rgba(0,8,25,0.95);padding:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;border:1px solid #0a1a33;color:#cce4ff;transition:all .2s;position:relative;overflow:hidden;height:90px;border-radius:2px;}
.app-btn:hover{border-color:#1a4488;box-shadow:0 0 12px rgba(0,80,255,0.3);}
.app-btn:hover .app-tile-bg{opacity:0.9;}
.app-tile-bg{position:absolute;inset:0;opacity:0.7;transition:opacity .2s;}
.app-icon{font-size:26px;position:relative;z-index:1;margin-bottom:2px;}
.app-name{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#88bbdd;position:relative;z-index:1;padding:4px 4px;width:100%;text-align:center;background:rgba(0,0,0,0.5);}
.cockpit-display{flex:1;position:relative;overflow:hidden;border-top:1px solid #0a1a33;}
.cockpit-display canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
/* System readouts */
.sys-readouts{padding:8px 12px;display:flex;flex-direction:column;gap:4px;background:rgba(0,3,12,0.9);border-top:1px solid #0a1a33;flex-shrink:0;}
.sys-row{display:flex;justify-content:space-between;align-items:center;}
.sys-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:#224466;letter-spacing:2px;}
.sys-val{font-family:'Share Tech Mono',monospace;font-size:8px;color:#0066aa;}
.sys-bar{flex:1;height:3px;background:rgba(0,40,100,0.3);margin:0 8px;border-radius:1px;overflow:hidden;}
.sys-bar-fill{height:100%;background:linear-gradient(90deg,#0044ff,#00aaff);border-radius:1px;}

/* COCKPIT FRAME OVERLAY */
.cockpit-frame{position:fixed;inset:0;z-index:9;pointer-events:none;}
.cockpit-frame svg{width:100%;height:100%;}

/* FLOATING WINDOWS */
.fwindow{position:fixed;background:rgba(0,5,20,0.97);border:1px solid #0a2244;z-index:100;display:none;flex-direction:column;min-width:320px;min-height:250px;box-shadow:0 0 30px rgba(0,50,200,0.2);}
.fwindow.active{display:flex;}
.fw-title{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(0,8,30,0.98);border-bottom:1px solid #0a1a33;cursor:move;flex-shrink:0;}
.fw-name{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:#4488cc;}
.fw-close{background:none;border:1px solid #0a2244;color:#4488cc;cursor:pointer;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.fw-body{flex:1;overflow:hidden;padding:12px;}

/* CALCULATOR */
.calc{display:grid;gap:4px;}
.calc-display{background:rgba(0,3,12,0.9);border:1px solid #0a1a33;padding:8px 10px;font-family:'Share Tech Mono',monospace;font-size:20px;color:#88ccff;text-align:right;margin-bottom:6px;min-height:40px;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.calc-btn{background:rgba(0,10,40,0.9);border:1px solid #0a1a33;color:#cce4ff;font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 4px;cursor:pointer;transition:background .15s;}
.calc-btn:hover{background:rgba(0,30,100,0.8);}
.calc-btn.op{color:#44aaff;border-color:#0a2244;}
.calc-btn.eq{background:rgba(0,30,120,0.9);color:#88ccff;}

/* NOTES */
.notes-area{width:100%;height:100%;background:rgba(0,3,12,0.9);border:1px solid #0a1a33;color:#cce4ff;font-family:'Exo 2',sans-serif;font-size:12px;padding:8px;resize:none;outline:none;line-height:1.6;}

/* EMULATOR */
.emu-frame{width:100%;height:100%;border:none;background:#000;}
</style>
</head>
<body>

<!-- SPACE BG -->
<video id="bgVideo" autoplay loop muted playsinline>
  <source src="bg.mp4" type="video/mp4">
  <source src="storage_v1/bg.mp4" type="video/mp4">
</video>

<!-- MATRIX -->
<canvas id="matrixCanvas"></canvas>

<!-- BOOT -->
<div id="boot">
  <div id="bootTitle">K H A I O S</div>
  <div id="bootSub">A.I.O.S. &nbsp; MULTITOOL</div>
  <div id="bootBar"><div id="bootBarFill"></div></div>
</div>

<!-- COCKPIT FRAME -->
<div class="cockpit-frame">
  <svg viewBox="0 0 1366 768" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corner brackets -->
    <path d="M0,0 L80,0 L80,4 L4,4 L4,80 L0,80 Z" fill="#0044ff" opacity="0.6"/>
    <path d="M1366,0 L1286,0 L1286,4 L1362,4 L1362,80 L1366,80 Z" fill="#0044ff" opacity="0.6"/>
    <path d="M0,768 L80,768 L80,764 L4,764 L4,688 L0,688 Z" fill="#0044ff" opacity="0.6"/>
    <path d="M1366,768 L1286,768 L1286,764 L1362,764 L1362,688 L1366,688 Z" fill="#0044ff" opacity="0.6"/>

    <rect x="0" y="43" width="1366" height="1" fill="#0033aa" opacity="0.5"/>
    <!-- Bottom scanline -->
    <rect x="0" y="724" width="1366" height="1" fill="#0033aa" opacity="0.5"/>
    <!-- Center divider -->

</div>

<!-- MAIN COCKPIT UI -->
<div id="cockpit">
  <div class="hud-top">
    <div class="hud-logo">A.I.O.S.</div>

    <div class="hud-status">
      <div class="hud-badge" id="providerBadge">GROQ</div>

  <div class="main-area">
    <!-- LEFT: CHAT -->
    <div class="chat-panel">

    <!-- RIGHT: APPS + DISPLAY -->
    <div class="apps-panel">

        </button>

          <div class="app-icon">🌐</div>
          <div class="app-name">BROWSER</div>

      <!-- Cockpit display panel -->
      <div class="cockpit-display" id="cockpitDisplay"></div>

      <!-- System readouts -->
      <div class="sys-readouts">
        <div class="sys-row">
          <span class="sys-label">NEURAL</span>
          <div class="sys-bar"><div class="sys-bar-fill" id="bar1" style="width:78%"></div></div>
          <span class="sys-val">78%</span>
        </div>
        <div class="sys-row">
          <span class="sys-label">UPLINK</span>
          <div class="sys-bar"><div class="sys-bar-fill" id="bar2" style="width:92%"></div></div>
          <span class="sys-val">92%</span>
        </div>
        <div class="sys-row">
          <span class="sys-label">SHIELDS</span>
          <div class="sys-bar"><div class="sys-bar-fill" id="bar3" style="width:65%"></div></div>
          <span class="sys-val">65%</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FLOATING WINDOWS -->
<div class="fwindow" id="fw-calculator" style="left:200px;top:100px;width:280px;height:340px;">
  <div class="fw-title" onmousedown="dragStart(event,'fw-calculator')">
    <span class="fw-name">◈ CALCULATOR</span>
    <button class="fw-close" onclick="closeApp('calculator')">✕</button>
  </div>
  <div class="fw-body">
    <div class="calc">
      <div class="calc-display" id="calcDisplay">0</div>
      <div class="calc-grid">
        <button class="calc-btn op" onclick="calcInput('C')">C</button>
        <button class="calc-btn op" onclick="calcInput('+/-')">+/-</button>
        <button class="calc-btn op" onclick="calcInput('%')">%</button>
        <button class="calc-btn op" onclick="calcInput('/')">÷</button>
        <button class="calc-btn" onclick="calcInput('7')">7</button>
        <button class="calc-btn" onclick="calcInput('8')">8</button>
        <button class="calc-btn" onclick="calcInput('9')">9</button>
        <button class="calc-btn op" onclick="calcInput('*')">×</button>
        <button class="calc-btn" onclick="calcInput('4')">4</button>
        <button class="calc-btn" onclick="calcInput('5')">5</button>
        <button class="calc-btn" onclick="calcInput('6')">6</button>
        <button class="calc-btn op" onclick="calcInput('-')">−</button>
        <button class="calc-btn" onclick="calcInput('1')">1</button>
        <button class="calc-btn" onclick="calcInput('2')">2</button>
        <button class="calc-btn" onclick="calcInput('3')">3</button>
        <button class="calc-btn op" onclick="calcInput('+')">+</button>
        <button class="calc-btn" onclick="calcInput('0')" style="grid-column:span 2">0</button>
        <button class="calc-btn" onclick="calcInput('.')">.</button>
        <button class="calc-btn eq" onclick="calcInput('=')">=</button>
      </div>
    </div>
  </div>
</div>

<div class="fwindow" id="fw-notes" style="left:300px;top:120px;width:380px;height:320px;">

    <span class="fw-name">◈ MISSION LOG</span>
    <button class="fw-close" onclick="closeApp('notes')">✕</button>
  </div>
  <div class="fw-body" style="padding:8px;">
    <textarea class="notes-area" id="notesArea" placeholder="Enter mission log..."></textarea>
  </div>

<div class="fwindow" id="fw-browser" style="left:150px;top:100px;width:600px;height:450px;">

    <span class="fw-name">◈ NET BROWSER</span>
    <button class="fw-close" onclick="closeApp('browser')">✕</button>
  </div>
  <div class="fw-body" style="padding:8px;display:flex;flex-direction:column;gap:6px;">
    <div style="display:flex;gap:4px;flex-shrink:0;">

      <button onclick="loadBrowser()" class="sbtn" style="width:50px;font-size:9px;font-family:'Share Tech Mono',monospace;">GO</button>

</div>

<div class="fwindow" id="fw-weather" style="left:200px;top:100px;width:340px;height:300px;">
  <div class="fw-title" onmousedown="dragStart(event,'fw-weather')">

</div>

<div class="fwindow" id="fw-maps" style="left:200px;top:100px;width:500px;height:400px;">
  <div class="fw-title" onmousedown="dragStart(event,'fw-maps')">
    <span class="fw-name">◈ NAV MAPS</span>
    <button class="fw-close" onclick="closeApp('maps')">✕</button>
  </div>
  <div class="fw-body" style="padding:0;">
    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-90.1,29.9,-89.9,30.1&layer=mapnik" style="width:100%;height:100%;border:none;filter:invert(1) hue-rotate(180deg);"></iframe>
  </div>
</div>

<script>
var API_URL='https://khaios-assests-py-24-7.onrender.com/api/chat';
var SYSTEM=`You are KHAIOS — a razor-sharp feminine intelligence embedded in the A.I.O.S. Multitool. Think JARVIS precision meets quiet feminine power. Address the user as Commander, always. Calm, warm, wickedly capable. Responses concise — one or two sentences unless depth needed.`;

// ── CLOCK ──────────────────────────────────────────────────────────────────
setInterval(function(){
  var d=new Date();
  document.getElementById('clockDisplay').textContent=
    d.toLocaleDateString()+'  '+d.toTimeString().slice(0,8);
},1000);

// ── MATRIX RAIN ───────────────────────────────────────────────────────────
(function(){
  var c=document.getElementById('matrixCanvas');
  var ctx=c.getContext('2d');
  var W,H,cols,drops,speeds,lens,bright;
  var FS=14;
  var CHARS='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ0123456789AIOSABCDEFZ∆∇∞⊗⊕ΨΩ';
  function rch(){return CHARS[Math.floor(Math.random()*CHARS.length)];}
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    cols=Math.ceil(W/FS)+1;drops=[];speeds=[];lens=[];bright=[];
    for(var i=0;i<cols;i++){drops[i]=Math.random()*-H;speeds[i]=FS*(0.3+Math.random()*0.8);lens[i]=10+Math.floor(Math.random()*25);bright[i]=0.4+Math.random()*0.4;}
    ctx.fillStyle='#000510';ctx.fillRect(0,0,W,H);
  }
  function draw(){
    ctx.fillStyle='rgba(0,5,20,0.18)';ctx.fillRect(0,0,W,H);
    for(var i=0;i<cols;i++){
      var x=i*FS,headY=drops[i];
      for(var j=0;j<lens[i];j++){
        var cy=headY-j*FS;if(cy<-FS||cy>H+FS)continue;
        var fade=Math.pow(1-j/lens[i],1.4);
        ctx.save();
        if(j===0){ctx.shadowColor='#00eeff';ctx.shadowBlur=14;ctx.fillStyle='rgba(200,240,255,'+bright[i]+')';ctx.font='bold '+FS+'px monospace';}
        else if(j<3){ctx.shadowBlur=6;ctx.fillStyle='rgba(80,160,255,'+(fade*bright[i])+')';ctx.font='bold '+FS+'px monospace';}
        else{ctx.shadowBlur=0;ctx.fillStyle='rgba(0,60,180,'+(fade*bright[i]*0.7)+')';ctx.font=FS+'px monospace';}
        ctx.fillText(rch(),x,cy);ctx.restore();
      }
      drops[i]+=speeds[i]*0.4;
      if(drops[i]-lens[i]*FS>H){drops[i]=Math.random()*-100;speeds[i]=FS*(0.3+Math.random()*0.8);lens[i]=10+Math.floor(Math.random()*25);bright[i]=0.4+Math.random()*0.4;}
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();requestAnimationFrame(draw);
})();

// ── BOOT ──────────────────────────────────────────────────────────────────
var bootDone=false;
function completeBoot(){
  if(bootDone)return;bootDone=true;
  var el=document.getElementById('boot');
  el.style.transition='opacity 1.5s';el.style.opacity='0';
  setTimeout(function(){
    el.style.display='none';
    // Switch: fade out video, fade in matrix
    document.getElementById('bgVideo').style.opacity='0';
    setTimeout(function(){document.getElementById('matrixCanvas').style.opacity='0.4';},800);
    document.getElementById('cockpit').style.display='flex';
    sendGreeting();
    animateBars();
  },1500);
}
(function(){
  // Boot: fade in video, keep matrix hidden
  setTimeout(function(){document.getElementById('bgVideo').style.opacity='0.85';},100);
  document.getElementById('matrixCanvas').style.opacity='0';
  setTimeout(function(){document.getElementById('bootTitle').style.opacity=1;},300);
  setTimeout(function(){document.getElementById('bootSub').style.opacity=1;},800);
  setTimeout(function(){
    var bar=document.getElementById('bootBar');
    bar.style.opacity=1;
    setTimeout(function(){document.getElementById('bootBarFill').style.width='100%';},100);
  },1200);
  setTimeout(completeBoot,10000);
})();

// ── SYSTEM BARS ANIMATION ────────────────────────────────────────────────
function animateBars(){
  setInterval(function(){
    var vals=[Math.floor(65+Math.random()*30),Math.floor(80+Math.random()*18),Math.floor(50+Math.random()*45)];
    ['bar1','bar2','bar3'].forEach(function(id,i){
      var el=document.getElementById(id);if(el){el.style.width=vals[i]+'%';}
    });
  },2000);
}

// ── SPEECH ────────────────────────────────────────────────────────────────
var cachedVoice=null,userInteracted=false,pendingSpeech=null,msgStore={},msgCounter=0;
function getVoice(){if(cachedVoice)return cachedVoice;var voices=speechSynthesis.getVoices();var v=voices.find(function(x){return x.name.includes('Zira');})||voices.find(function(x){return x.name.includes('Samantha');})||null;if(v)cachedVoice=v;return v;}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){getVoice();};}
function onInteract(){if(userInteracted)return;userInteracted=true;if(pendingSpeech){speak(pendingSpeech);pendingSpeech=null;}}
document.addEventListener('click',onInteract,{once:true});
function speak(text){
  if(!window.speechSynthesis)return;
  if(!userInteracted){pendingSpeech=text;return;}
  speechSynthesis.cancel();
  var chunks=text.match(/[^.!?]{1,180}[.!?]*/g)||[text];
  var voice=getVoice();
  function sc(i){if(i>=chunks.length)return;var u=new SpeechSynthesisUtterance(chunks[i]);u.rate=0.9;u.pitch=1.15;if(voice)u.voice=voice;u.onend=function(){sc(i+1);};speechSynthesis.speak(u);}
  sc(0);
}
function replayMsg(btn,mid){speechSynthesis.cancel();speak(msgStore[mid]||'');}

// ── CHAT ──────────────────────────────────────────────────────────────────
var chatHistory=[],busy=false;
function addMsg(role,text){
  var mid='m'+(msgCounter++);
  var d=document.createElement('div');d.className='msg '+(role==='ai'?'ai':'user');
  if(role==='ai'){msgStore[mid]=text;d.innerHTML='<div class="mlabel">KHAIOS</div><div class="mbubble"><span class="mtext">'+text+'</span><button class="playbtn" onclick="replayMsg(this,\''+mid+'\')">&#9654;</button></div>';}
  else{d.innerHTML='<div class="mlabel">COMMANDER</div><div class="mbubble">'+text+'</div>';}
  document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth'});
}
function addThinking(){var d=document.createElement('div');d.className='thinking';d.innerHTML='KHAIOS <span class="tdots"><span>.</span><span>.</span><span>.</span></span>';document.getElementById('chat').appendChild(d);d.scrollIntoView({behavior:'smooth'});return d;}
async function callAPI(messages){
  var res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:messages})});
  var data=await res.json();
  document.getElementById('providerBadge').textContent=(data.provider||'AI').toUpperCase();
  return data.content;
}
async function sendMsg(text){
  if(busy||!text.trim())return;busy=true;
  document.getElementById('sbtn').disabled=true;
  addMsg('user',text);
  var thinking=addThinking();
  chatHistory.push({role:'user',content:text});
  try{
    var response=await callAPI([{role:'system',content:SYSTEM}].concat(chatHistory));
    chatHistory.push({role:'assistant',content:response});
    thinking.remove();addMsg('ai',response);speak(response);
  }catch(e){thinking.remove();addMsg('ai','Systems recalibrating, Commander.');}
  busy=false;document.getElementById('sbtn').disabled=false;
}
function sendGreeting(){addMsg('ai','Systems online, Commander. A.I.O.S. Multitool ready.');}

document.getElementById('sbtn').addEventListener('click',function(){var f=document.getElementById('ifield');sendMsg(f.value.trim());f.value='';f.style.height='';});
document.getElementById('ifield').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();var f=document.getElementById('ifield');sendMsg(f.value.trim());f.value='';f.style.height='';}});
document.getElementById('ifield').addEventListener('input',function(){this.style.height='';this.style.height=Math.min(this.scrollHeight,70)+'px';});

// ── APP WINDOWS ────────────────────────────────────────────────────────────
function openApp(name){document.getElementById('fw-'+name).classList.add('active');}
function closeApp(name){document.getElementById('fw-'+name).classList.remove('active');}

// ── DRAG WINDOWS ──────────────────────────────────────────────────────────
var drag={el:null,ox:0,oy:0,sx:0,sy:0};
function dragStart(e,id){
  drag.el=document.getElementById(id);
  var r=drag.el.getBoundingClientRect();
  drag.ox=e.clientX-r.left;drag.oy=e.clientY-r.top;
  document.onmousemove=function(e2){
    if(!drag.el)return;
    drag.el.style.left=(e2.clientX-drag.ox)+'px';
    drag.el.style.top=(e2.clientY-drag.oy)+'px';
  };
  document.onmouseup=function(){drag.el=null;document.onmousemove=null;document.onmouseup=null;};
}

// ── CALCULATOR ────────────────────────────────────────────────────────────
var calcStr='',calcPrev='',calcOp='',calcNew=true;
function calcInput(v){
  var d=document.getElementById('calcDisplay');
  if(v==='C'){calcStr='0';calcPrev='';calcOp='';calcNew=true;d.textContent='0';return;}
  if(v==='='){ try{var r=eval(calcPrev+calcOp+calcStr);d.textContent=parseFloat(r.toFixed(10));calcStr=String(r);calcPrev='';calcOp='';}catch(e){d.textContent='ERR';}calcNew=true;return;}
  if(['+','-','*','/'].includes(v)){calcPrev=calcStr;calcOp=v;calcNew=true;return;}
  if(v==='%'){try{d.textContent=parseFloat((eval(calcStr)/100).toFixed(10));}catch(e){}return;}
  if(v==='+/-'){calcStr=String(-parseFloat(calcStr)||0);d.textContent=calcStr;return;}
  if(calcNew){calcStr='';calcNew=false;}
  if(v==='.'&&calcStr.includes('.'))return;
  calcStr+=v;d.textContent=calcStr;
}

function loadEmu(url){document.getElementById('emuFrame').src=url;}
document.getElementById('romFile').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;

function loadBrowser(){
  var url=document.getElementById('browserUrl').value;
  if(!url.startsWith('http'))url='https://'+url;

}
