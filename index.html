<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KHAIOS — Primordial Intelligence</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0044cc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KHAIOS">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#000510;color:#e8f4ff;font-family:'Exo 2',sans-serif;}
#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#boot{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:60px;}
#bootCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99;pointer-events:none;}
#bootTitle{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:12px;background:linear-gradient(90deg,#fff,#44aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transition:opacity 1.5s;text-align:center;position:relative;z-index:101;}
#bootText{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;color:#88ccff;text-align:center;opacity:0;transition:opacity 1s;margin-top:8px;text-shadow:0 0 15px #0066ff;position:relative;z-index:101;}
#app{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:rgba(0,5,20,0.97);border-bottom:1px solid #1a3366;flex-shrink:0;}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:6px;background:linear-gradient(90deg,#fff,#44aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.pbadge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;border:1px solid #3366aa;color:#66aaff;letter-spacing:2px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#3388ff;animation:pulse 2s infinite;display:inline-block;box-shadow:0 0 8px #0066ff;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #0066ff;}50%{opacity:0.4;box-shadow:none;}}
.chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;background:rgba(0,4,16,0.85);}
.chat::-webkit-scrollbar{width:2px;}
.chat::-webkit-scrollbar-thumb{background:#1a3366;}
.msg{display:flex;flex-direction:column;gap:4px;animation:fadein 0.3s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.mlabel{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;font-weight:700;}
.msg.ai .mlabel{color:#66aaff;}
.msg.user .mlabel{color:#3366aa;}
.mbubble{padding:10px 14px;font-size:13px;line-height:1.65;font-weight:300;max-width:88%;white-space:pre-wrap;word-break:break-word;border-radius:2px;}
.msg.ai .mbubble{background:rgba(0,30,100,0.92);border-left:3px solid #3388ff;color:#e8f4ff;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.msg.ai .mtext{flex:1;min-width:0;}
.msg.user .mbubble{background:rgba(0,15,55,0.88);border-right:3px solid #1a4488;color:#bbddff;align-self:flex-end;}
.thinking{font-family:'Share Tech Mono',monospace;font-size:11px;color:#4488cc;padding:8px 14px;display:flex;gap:6px;align-items:center;}
.tdots span{animation:blink 1.2s infinite;opacity:0;}
.tdots span:nth-child(2){animation-delay:.3s;}
.tdots span:nth-child(3){animation-delay:.6s;}
@keyframes blink{0%,100%{opacity:0;}50%{opacity:1;}}
.playbtn{background:none;border:1px solid #3366aa;border-radius:50%;width:22px;height:22px;cursor:pointer;color:#66aaff;font-size:9px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.playbtn:hover{background:rgba(0,60,180,0.4);}
.irow{padding:10px 14px;border-top:1px solid #1a3366;background:rgba(0,4,18,0.97);display:flex;gap:8px;flex-shrink:0;}
.ifield{flex:1;background:rgba(0,8,30,0.95);border:1px solid #1a3366;border-radius:2px;padding:9px 12px;font-family:'Exo 2',sans-serif;font-size:13px;color:#e8f4ff;outline:none;resize:none;min-height:38px;max-height:80px;line-height:1.5;transition:border-color .2s;}
.ifield:focus{border-color:#3388ff;}
.ifield::placeholder{color:#1a3366;}
.sbtn{width:38px;height:38px;border:1px solid #3366aa;border-radius:2px;background:rgba(0,20,80,0.6);cursor:pointer;color:#66aaff;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;align-self:flex-end;flex-shrink:0;}
.sbtn:hover{background:rgba(0,50,180,0.5);}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;}
.stage{flex-shrink:0;height:300px;position:relative;overflow:hidden;}
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div id="boot">
  <div id="bootTitle">K H A I O S</div>
  <div id="bootText">AIOS MULTITOOL</div>
</div>
<div id="app">
  <div class="topbar">
    <div class="logo">KHAIOS</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="pbadge" id="providerBadge">GROQ</div>
      <div class="sdot"></div>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="irow">
    <textarea class="ifield" id="ifield" placeholder="Commander..." rows="1"></textarea>
    <button class="sbtn" id="sbtn">&#9654;</button>
  </div>
  <div class="stage" id="stage">
    <iframe id="stageFrame" src="test3d.html" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" scrolling="no"></iframe>
  </div>
</div>

<script>
var API_URL='https://khaios-assests-py-24-7.onrender.com/api/chat';
var SYSTEM=`You are KHAIOS — a razor-sharp feminine intelligence. Think JARVIS precision meets quiet feminine power. Address the user as Commander, always. You are calm, warm, and wickedly capable. Responses are concise and confident — never rambling. One or two sentences unless depth is truly needed.`;

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}

// ── MATRIX RAIN ───────────────────────────────────────────────────────────────
(function(){
  var c=document.getElementById('matrixCanvas');
  var ctx=c.getContext('2d');
  var W,H,cols,drops,speeds,lens,bright;
  var FS=15;
  var CHARS='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789KHAIOSABCDEFZ∆∇∞⊗⊕ΨΩ';
  function rch(){return CHARS[Math.floor(Math.random()*CHARS.length)];}
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    cols=Math.ceil(W/FS)+1;drops=[];speeds=[];lens=[];bright=[];
    for(var i=0;i<cols;i++){drops[i]=Math.random()*-H*1.5;speeds[i]=FS*(0.3+Math.random()*1.0);lens[i]=15+Math.floor(Math.random()*35);bright[i]=0.5+Math.random()*0.5;}
    ctx.fillStyle='#000510';ctx.fillRect(0,0,W,H);
  }
  function draw(){
    ctx.fillStyle='rgba(0,5,20,0.15)';ctx.fillRect(0,0,W,H);
    for(var i=0;i<cols;i++){
      var x=i*FS,headY=drops[i];
      for(var j=0;j<lens[i];j++){
        var cy=headY-j*FS;if(cy<-FS||cy>H+FS)continue;
        var fade=Math.pow(1-j/lens[i],1.4);
        ctx.save();
        if(j===0){ctx.shadowColor='#00eeff';ctx.shadowBlur=18;ctx.fillStyle='rgba(220,255,255,'+bright[i]+')';ctx.font='bold '+FS+'px monospace';}
        else if(j<3){ctx.shadowColor='#0099ff';ctx.shadowBlur=8;ctx.fillStyle='rgba(100,180,255,'+(fade*bright[i])+')';ctx.font='bold '+FS+'px monospace';}
        else{ctx.shadowBlur=0;ctx.fillStyle='rgba(0,70,200,'+(fade*bright[i]*0.7)+')';ctx.font=FS+'px monospace';}
        ctx.fillText(rch(),x,cy);ctx.restore();
      }
      drops[i]+=speeds[i]*0.4;
      if(drops[i]-lens[i]*FS>H){drops[i]=Math.random()*-200;speeds[i]=FS*(0.3+Math.random()*1.0);lens[i]=15+Math.floor(Math.random()*35);bright[i]=0.5+Math.random()*0.5;}
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();requestAnimationFrame(draw);
})();

// ── BOOT ─────────────────────────────────────────────────────────────────────
function initBootThree(){
  // Show title immediately
  setTimeout(function(){document.getElementById('bootTitle').style.opacity=1;},500);
  setTimeout(function(){document.getElementById('bootText').style.opacity=1;},1000);
  setTimeout(function(){completeBoot();},4000);
}
initBootThree();</script>
</body>
</html>
