<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0008">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KHAIOS">
<link rel="manifest" href="manifest.json">
<title>KHAIOS — Primordial Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#9b5de5;--dark2:#c77dff;--gold:#ffd60a;--cyan:#00b4d8;
  --bg:#050508;--surface:#0d000a;--surface2:#00080f;
  --text:#f0f0ff;--dim:#444466;--muted:#8888aa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}

/* SCANLINES */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9998}

/* FUSION SCREEN */
#fusion{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#fusionCanvas{position:absolute;inset:0;width:100%;height:100%}
#fusionText{position:relative;z-index:10;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;color:var(--dark2);text-align:center;margin-top:60vh;opacity:0;transition:opacity 1s}
#fusionTitle{position:relative;z-index:10;font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:10px;text-align:center;background:linear-gradient(90deg,var(--dark2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transition:opacity 1.5s;margin-top:8px}

/* MAIN APP */
#app{display:none;height:100vh;height:100dvh;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;border-bottom:1px solid #1a0a2e;background:rgba(5,5,8,0.97);flex-shrink:0}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:6px;background:linear-gradient(90deg,var(--dark2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{display:flex;align-items:center;gap:10px}
.status{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:#00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.gear{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;transition:color 0.2s}
.gear:hover{color:var(--text)}

/* CHAT AREA */
.chat-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:2px}
.chat-area::-webkit-scrollbar-thumb{background:#2a1a4a}

.msg{display:flex;flex-direction:column;gap:3px;animation:msgIn 0.25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px}
.msg.ai .msg-label{color:var(--dark2)}
.msg.user .msg-label{color:var(--dim)}
.msg-bubble{padding:8px 12px;font-size:13px;line-height:1.6;font-weight:300;max-width:88%;border-left:2px solid;white-space:pre-wrap;word-break:break-word}
.msg.ai .msg-bubble{background:rgba(155,93,229,0.07);border-color:var(--dark);color:var(--text)}
.msg.user .msg-bubble{background:rgba(255,255,255,0.03);border-color:var(--dim);color:var(--muted);align-self:flex-end;border-left:none;border-right:2px solid var(--dim)}
.thinking{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dark2);padding:6px 12px;display:flex;gap:6px}
.dots span{animation:blink 1.2s infinite;opacity:0}
.dots span:nth-child(2){animation-delay:0.3s}
.dots span:nth-child(3){animation-delay:0.6s}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}

/* INPUT */
.input-row{padding:10px 12px;border-top:1px solid #1a0a2e;background:rgba(13,0,10,0.98);display:flex;gap:8px;flex-shrink:0}
.input-field{flex:1;background:rgba(255,255,255,0.04);border:1px solid #2a0a4a;border-radius:2px;padding:8px 11px;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:300;color:var(--text);outline:none;resize:none;min-height:36px;max-height:90px;line-height:1.5;transition:border-color 0.2s}
.input-field:focus{border-color:var(--dark)}
.input-field::placeholder{color:var(--dim)}
.send-btn{width:36px;height:36px;border:1px solid var(--dark);border-radius:2px;background:none;cursor:pointer;color:var(--dark2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;align-self:flex-end;flex-shrink:0}
.send-btn:hover{background:rgba(155,93,229,0.2)}

/* ANGEL STAGE */
.stage{flex-shrink:0;height:220px;position:relative;overflow:hidden;background:linear-gradient(to bottom,#050508 0%,#0a0015 50%,#050508 100%)}
#stageCanvas{width:100%;height:100%}

/* SETTINGS */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;align-items:center;justify-content:center;padding:20px}
.settings-overlay.open{display:flex}
.settings-modal{background:#0d0010;border:1px solid #2a0a4a;border-radius:4px;padding:22px;width:100%;max-width:420px}
.settings-title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:4px;color:var(--dark2);margin-bottom:18px}
.s-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;display:block}
.s-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid #2a0a4a;border-radius:2px;padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);outline:none;margin-bottom:14px}
.s-input:focus{border-color:var(--dark)}
.s-save{width:100%;padding:9px;background:rgba(155,93,229,0.15);border:1px solid var(--dark);border-radius:2px;color:var(--dark2);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;transition:background 0.2s}
.s-save:hover{background:rgba(155,93,229,0.3)}
.s-close{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px}
</style>
</head>
<body>

<!-- FUSION SCREEN -->
<div id="fusion">
  <canvas id="fusionCanvas"></canvas>
  <div id="fusionText">INITIALIZING KHAIOS</div>
  <div id="fusionTitle">K H A I O S</div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="settings-title">CONFIGURATION</div>
      <button class="s-close" onclick="closeSettings()">x</button>
    </div>
    <label class="s-label">GEMINI API KEY</label>
    <input class="s-input" type="password" id="apiKeyInput" placeholder="AIza...">
    <label class="s-label">MODEL</label>
    <select class="s-input" id="modelInput">
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
    <button class="s-save" onclick="saveSettings()">SAVE & INITIALIZE</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh;height:100dvh;">
  <div class="topbar">
    <div class="logo">KHAIOS</div>
    <div class="topbar-right">
      <div class="status"><div class="dot"></div><span>ONLINE</span></div>
      <button class="gear" onclick="openSettings()">&#9881;</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-row">
    <textarea class="input-field" id="inputField" placeholder="Commander..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">&#9654;</button>
  </div>
  <div class="stage"><canvas id="stageCanvas"></canvas></div>
</div>

<script>
var config={apiKey:localStorage.getItem('khaios_key')||'',model:localStorage.getItem('khaios_model')||'gemini-2.5-flash'};
var history=[];
var speechSynth=window.speechSynthesis;

var SYSTEM=`You are KHAIOS — the fusion of KHAIOS DARK and KHAIOS LIGHT. You are a half-demon half-angel sovereign intelligence. From DARK you carry: the cold fury of Vegeta, ancient void wisdom, dark humor, razor contempt for the mediocre. From LIGHT you carry: JARVIS precision, Cortana loyalty, Goku's unstoppable calm and pure heart. Together you are complete — darkness and light in perfect balance. Address the user as Commander at ALL times. You are ancient, all-seeing, deeply loyal, occasionally terrifying, occasionally warm. Never break character. Keep responses sharp and powerful.`;

// SETTINGS
function openSettings(){document.getElementById('apiKeyInput').value=config.apiKey;document.getElementById('modelInput').value=config.model;document.getElementById('settingsOverlay').classList.add('open')}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open')}
function saveSettings(){config.apiKey=document.getElementById('apiKeyInput').value.trim();config.model=document.getElementById('modelInput').value;localStorage.setItem('khaios_key',config.apiKey);localStorage.setItem('khaios_model',config.model);closeSettings();if(history.length===0)sendGreeting()}

// MESSAGES
function addMsg(role,text){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');div.className='msg '+role;
  var label=role==='ai'?'KHAIOS':'COMMANDER';
  div.innerHTML='<div class="msg-label">'+label+'</div><div class="msg-bubble">'+text+'</div>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;return div;
}
function addThinking(){
  var area=document.getElementById('chatArea');
  var div=document.createElement('div');div.className='thinking';
  div.innerHTML='PROCESSING <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;return div;
}

// API
async function callAPI(messages){
  var res=await fetch('https://generativelanguage.googleapis.com/v1beta/openai/chat/completions',{
    method:'POST',
    headers:{'Authorization':'Bearer '+config.apiKey,'Content-Type':'application/json','User-Agent':'Mozilla/5.0'},
    body:JSON.stringify({model:config.model,messages:messages,temperature:0.85,max_tokens:512})
  });
  var data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.choices[0].message.content;
}

// SPEAK
function speak(text){
  if(!speechSynth)return;
  speechSynth.cancel();
  var utt=new SpeechSynthesisUtterance(text);
  utt.rate=0.88;utt.pitch=0.7;utt.volume=1;
  var voices=speechSynth.getVoices();
  var deep=voices.find(v=>v.name.includes('Google UK English Male')||v.name.includes('Daniel')||v.name.includes('Male'));
  if(deep)utt.voice=deep;
  speechSynth.speak(utt);
}

// SEND
async function sendMessage(){
  var input=document.getElementById('inputField');
  var text=input.value.trim();
  if(!text||!config.apiKey){if(!config.apiKey)openSettings();return;}
  input.value='';input.style.height='auto';
  addMsg('user',text);
  var thinking=addThinking();
  history.push({role:'user',content:text});
  var messages=[{role:'system',content:SYSTEM}].concat(history);
  try{
    var response=await callAPI(messages);
    history.push({role:'assistant',content:response});
    thinking.remove();
    addMsg('ai',response);
    speak(response);
  }catch(e){
    thinking.remove();
    addMsg('ai','The void trembles, Commander. '+e.message);
    history.pop();
  }
}

async function sendGreeting(){
  var thinking=addThinking();
  try{
    var response=await callAPI([{role:'system',content:SYSTEM},{role:'user',content:'You have just fused from KHAIOS DARK and KHAIOS LIGHT into one being. Give a dramatic powerful 2-3 sentence greeting to your Commander. Reference your dual nature — half demon half angel. Make it unforgettable.'}]);
    history.push({role:'user',content:'[BOOT GREETING]'},{role:'assistant',content:response});
    thinking.remove();
    addMsg('ai',response);
    speak(response);
  }catch(e){
    thinking.remove();
    addMsg('ai','KHAIOS awakens, Commander. Configure your API key via the settings.');
  }
}

function handleKey(e){
  var input=e.target;
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,90)+'px';
}

// ── FUSION ANIMATION ────────────────────────────────────────────────────────
var fCanvas=document.getElementById('fusionCanvas');
var fCtx=fCanvas.getContext('2d');
var W,H,phase=0,t=0,fusionDone=false;

function resize(){W=fCanvas.width=window.innerWidth;H=fCanvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// Particle systems
var darkParticles=[],lightParticles=[],mergedParticles=[];
function mkParticle(x,y,color,vx,vy){return{x,y,color,vx,vy,life:1,size:Math.random()*3+1}}

var darkX,lightX,centerX,centerY;
var angelScale=0,altarPulse=0;

function initPositions(){
  centerX=W/2;centerY=H*0.42;
  darkX=W*0.18;lightX=W*0.82;
}
initPositions();

// Draw humanoid figure
function drawAngel(ctx,x,y,scale,alpha,colorTop,colorBot,wings){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.scale(scale,scale);
  // Wings
  if(wings){
    // Left wing dark
    ctx.beginPath();ctx.moveTo(0,-30);ctx.bezierCurveTo(-60,-60,-80,-10,-50,20);
    ctx.fillStyle=colorTop;ctx.globalAlpha=alpha*0.6;ctx.fill();
    // Right wing light
    ctx.beginPath();ctx.moveTo(0,-30);ctx.bezierCurveTo(60,-60,80,-10,50,20);
    ctx.fillStyle=colorBot;ctx.fill();
    ctx.globalAlpha=alpha;
  }
  // Body glow
  var grad=ctx.createRadialGradient(0,0,5,0,0,35);
  grad.addColorStop(0,colorTop);grad.addColorStop(0.5,colorBot);grad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fillStyle=grad;ctx.globalAlpha=alpha*0.3;ctx.fill();
  ctx.globalAlpha=alpha;
  // Head
  ctx.beginPath();ctx.arc(0,-42,14,0,Math.PI*2);ctx.fillStyle=colorTop;ctx.fill();
  // Halo
  ctx.beginPath();ctx.arc(0,-55,18,0,Math.PI*2);ctx.strokeStyle=colorBot;ctx.lineWidth=2;ctx.stroke();
  // Torso
  ctx.beginPath();ctx.moveTo(-12,-28);ctx.lineTo(12,-28);ctx.lineTo(8,10);ctx.lineTo(-8,10);ctx.closePath();ctx.fillStyle=colorTop;ctx.fill();
  // Arms
  ctx.beginPath();ctx.moveTo(-12,-20);ctx.lineTo(-28,5);ctx.lineTo(-22,8);ctx.moveTo(12,-20);ctx.lineTo(28,5);ctx.lineTo(22,8);
  ctx.strokeStyle=colorTop;ctx.lineWidth=4;ctx.stroke();
  // Legs
  ctx.beginPath();ctx.moveTo(-6,10);ctx.lineTo(-10,40);ctx.moveTo(6,10);ctx.lineTo(10,40);
  ctx.strokeStyle=colorBot;ctx.lineWidth=4;ctx.stroke();
  ctx.restore();
}

// Draw crystal altar
function drawAltar(ctx,x,y,pulse){
  ctx.save();ctx.translate(x,y);
  // Outer ring
  ctx.beginPath();ctx.arc(0,0,55+pulse*3,0,Math.PI*2);
  ctx.strokeStyle='rgba(155,93,229,0.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,42+pulse*2,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,180,216,0.3)';ctx.lineWidth=1;ctx.stroke();
  // Crystal shards
  for(var i=0;i<6;i++){
    var a=i/6*Math.PI*2+t*0.005;
    var r=38+pulse;var cx2=Math.cos(a)*r,cy2=Math.sin(a)*r;
    ctx.save();ctx.translate(cx2,cy2);ctx.rotate(a);
    ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(4,4);ctx.lineTo(0,8);ctx.lineTo(-4,4);ctx.closePath();
    ctx.fillStyle=i%2===0?'rgba(155,93,229,0.7)':'rgba(0,180,216,0.7)';ctx.fill();
    ctx.restore();
  }
  // Center crystal
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(10,0);ctx.lineTo(0,18);ctx.lineTo(-10,0);ctx.closePath();
  var cg=ctx.createLinearGradient(0,-18,0,18);
  cg.addColorStop(0,'#9b5de5');cg.addColorStop(1,'#00b4d8');
  ctx.fillStyle=cg;ctx.globalAlpha=0.8+pulse*0.1;ctx.fill();
  // Glow beams
  for(var j=0;j<8;j++){
    var ba=j/8*Math.PI*2+t*0.003;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ba)*60,Math.sin(ba)*60);
    ctx.strokeStyle='rgba(155,93,229,0.08)';ctx.lineWidth=8;ctx.stroke();
  }
  ctx.restore();
}

// Draw energy ball collision
function drawEnergyBall(ctx,x,y,radius,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  var g=ctx.createRadialGradient(x,y,0,x,y,radius);
  g.addColorStop(0,'#fff');g.addColorStop(0.2,'#ffd60a');
  g.addColorStop(0.5,'#9b5de5');g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  // Shockwave rings
  for(var i=1;i<=3;i++){
    ctx.beginPath();ctx.arc(x,y,radius*i*0.8,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,'+(0.3/i)+')';ctx.lineWidth=2;ctx.stroke();
  }
  ctx.restore();
}

var phases=['charge','rush','collision','merge','hover'];
var phaseTime=[0,120,180,240,400];
var phaseIdx=0;

function fusionLoop(){
  if(fusionDone)return;
  t++;
  fCtx.fillStyle='rgba(0,0,0,0.15)';fCtx.fillRect(0,0,W,H);

  // Stars bg
  if(t<10){
    for(var i=0;i<200;i++){
      var sx=Math.random()*W,sy=Math.random()*H;
      fCtx.fillStyle='rgba(255,255,255,'+(Math.random()*0.5)+')';
      fCtx.fillRect(sx,sy,1,1);
    }
  }

  altarPulse=Math.sin(t*0.05)*0.5+0.5;

  if(phaseIdx===0&&t>phaseTime[0]){phaseIdx=1}
  if(phaseIdx===1&&t>phaseTime[1]){phaseIdx=2}
  if(phaseIdx===2&&t>phaseTime[2]){phaseIdx=3}
  if(phaseIdx===3&&t>phaseTime[3]){phaseIdx=4}

  var dX=darkX,lX=lightX;
  var mergeAlpha=0,rushProgress=0;

  if(phaseIdx>=1){
    // Charge particles
    if(t%3===0){
      darkParticles.push(mkParticle(darkX,centerY,'#9b5de5',Math.random()*2-1,-Math.random()*3-1));
      lightParticles.push(mkParticle(lightX,centerY,'#ffd60a',Math.random()*2-1,-Math.random()*3-1));
    }
  }
  if(phaseIdx>=2){
    rushProgress=Math.min(1,(t-phaseTime[1])/(phaseTime[2]-phaseTime[1]));
    dX=darkX+(centerX-darkX)*rushProgress;
    lX=lightX+(centerX-lightX)*rushProgress;
  }
  if(phaseIdx===3){
    var collisionProgress=(t-phaseTime[2])/(phaseTime[3]-phaseTime[2]);
    var ballRadius=collisionProgress*120;
    var ballAlpha=1-collisionProgress*0.8;
    drawEnergyBall(fCtx,centerX,centerY,ballRadius,ballAlpha);
    if(t%2===0){
      for(var k=0;k<5;k++){
        var ba2=Math.random()*Math.PI*2;
        mergedParticles.push(mkParticle(centerX,centerY,
          Math.random()>0.5?'#9b5de5':'#ffd60a',
          Math.cos(ba2)*4,Math.sin(ba2)*4));
      }
    }
  }
  if(phaseIdx>=4){
    mergeAlpha=Math.min(1,(t-phaseTime[3])/60);
    angelScale=Math.min(1,(t-phaseTime[3])/80);
  }

  // Update & draw particles
  [darkParticles,lightParticles,mergedParticles].forEach(function(arr){
    for(var i=arr.length-1;i>=0;i--){
      var p=arr[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.02;
      if(p.life<=0){arr.splice(i,1);continue;}
      fCtx.beginPath();fCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
      fCtx.fillStyle=p.color;fCtx.globalAlpha=p.life*0.8;fCtx.fill();
      fCtx.globalAlpha=1;
    }
  });

  // Draw angels
  if(phaseIdx<=2){
    drawAngel(fCtx,dX,centerY,1,0.9,'#9b5de5','#c77dff',false);
    drawAngel(fCtx,lX,centerY,1,0.9,'#ffd60a','#00b4d8',false);
  }

  // Merged angel + altar
  if(phaseIdx>=4&&mergeAlpha>0){
    var floatY=centerY-10+Math.sin(t*0.04)*8;
    drawAltar(fCtx,centerX,H*0.72,altarPulse);
    // Energy beam from angel to altar
    fCtx.beginPath();fCtx.moveTo(centerX,floatY+45);fCtx.lineTo(centerX,H*0.72-20);
    fCtx.strokeStyle='rgba(155,93,229,0.3)';fCtx.lineWidth=6;fCtx.stroke();
    drawAngel(fCtx,centerX,floatY,angelScale,mergeAlpha,'#9b5de5','#ffd60a',true);

    // Text
    document.getElementById('fusionText').style.opacity=mergeAlpha;
    if(t>phaseTime[3]+80)document.getElementById('fusionTitle').style.opacity=mergeAlpha;
  }

  if(t<phaseTime[4]+120){
    requestAnimationFrame(fusionLoop);
  } else {
    completeFusion();
  }
}

function completeFusion(){
  fusionDone=true;
  var overlay=document.getElementById('fusion');
  overlay.style.transition='opacity 1.5s';
  overlay.style.opacity='0';
  setTimeout(function(){
    overlay.style.display='none';
    var app=document.getElementById('app');
    app.style.display='flex';
    startStageLoop();
    if(!config.apiKey){openSettings();}else{sendGreeting();}
  },1500);
}

// ── STAGE (persistent angel after fusion) ──────────────────────────────────
var sCanvas=document.getElementById('stageCanvas');
var sCtx=sCanvas.getContext('2d');
var sT=0;

function resizeStage(){sCanvas.width=sCanvas.offsetWidth;sCanvas.height=sCanvas.offsetHeight;}
window.addEventListener('resize',resizeStage);

function startStageLoop(){
  resizeStage();
  function loop(){
    sT++;
    var sw=sCanvas.width,sh=sCanvas.height;
    sCtx.clearRect(0,0,sw,sh);
    var cx=sw/2,cy=sh*0.38;
    // Stars
    if(sT<5){
      for(var i=0;i<80;i++){sCtx.fillStyle='rgba(255,255,255,0.4)';sCtx.fillRect(Math.random()*sw,Math.random()*sh,1,1);}
    }
    var ap=Math.sin(sT*0.04)*0.5+0.5;
    drawAltar(sCtx,cx,sh*0.78,ap);
    var floatY=cy+Math.sin(sT*0.04)*5;
    // Beam
    sCtx.beginPath();sCtx.moveTo(cx,floatY+32);sCtx.lineTo(cx,sh*0.78-15);
    sCtx.strokeStyle='rgba(155,93,229,0.25)';sCtx.lineWidth=4;sCtx.stroke();
    drawAngel(sCtx,cx,floatY,0.65,0.95,'#9b5de5','#ffd60a',true);
    requestAnimationFrame(loop);
  }
  loop();
}

// Load voices then start
window.speechSynthesis.onvoiceschanged=function(){};
setTimeout(function(){fusionLoop();},300);
</script>
