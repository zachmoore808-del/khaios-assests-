<!DOCTYPE html>
<html>
<head>
<style>*{margin:0;padding:0;}body{background:#000a1f;overflow:hidden;}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000a1f,1);
renderer.outputEncoding=THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.01,1000);
camera.position.set(0,1,4);
camera.lookAt(0,1,0);

scene.add(new THREE.AmbientLight(0xffffff,1.5));
var dl=new THREE.DirectionalLight(0xffffff,2);dl.position.set(2,4,3);scene.add(dl);
var bl=new THREE.PointLight(0x00aaff,6,12);bl.position.set(0,2,3);scene.add(bl);

new THREE.GLTFLoader().load('https://zachmoore808-del.github.io/khaios-assests-/storage_v1/warrior_angel.glb',function(g){
  var model=g.scene;
  var box=new THREE.Box3().setFromObject(model);
  var sz=box.getSize(new THREE.Vector3());
  var ctr=box.getCenter(new THREE.Vector3());
  var sc=2/Math.max(sz.x,sz.y,sz.z);
  model.scale.setScalar(sc);
  model.position.set(-ctr.x*sc,-box.min.y*sc,-ctr.z*sc);
  scene.add(model);
  // Set camera to look at model center
  var box2=new THREE.Box3().setFromObject(model);
  var c2=box2.getCenter(new THREE.Vector3());
  camera.position.set(0,c2.y,4);
  camera.lookAt(0,c2.y,0);
  // Blue hologram
  model.traverse(function(n){
    if(n.isMesh)n.material=new THREE.MeshStandardMaterial({
      color:0x0044ff,emissive:0x0055ff,emissiveIntensity:3,
      transparent:true,opacity:0.92
    });
  });
  // Simple float animation only
  var t=0;
  (function loop(){
    requestAnimationFrame(loop);
    t+=0.016;
    model.position.y=(-box.min.y*sc)+(Math.sin(t*1.5)*0.06);
    renderer.render(scene,camera);
  })();
});
</script>
</body>
</html>
